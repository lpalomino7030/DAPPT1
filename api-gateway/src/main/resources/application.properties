spring.application.name=api-gateway
server.port=8090

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=clientes-route
spring.cloud.gateway.routes[0].uri=lb://MS-CLIENTES
spring.cloud.gateway.routes[0].predicates[0]=Path=/clientes/**

spring.cloud.gateway.routes[1].id=pedidos-route
spring.cloud.gateway.routes[1].uri=lb://MS-PEDIDOS
spring.cloud.gateway.routes[1].predicates[0]=Path=/pedidos/**